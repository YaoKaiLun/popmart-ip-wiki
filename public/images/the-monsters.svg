<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Orange monster gradient -->
    <radialGradient id="m-orange" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
    <!-- Orange monster shadow -->
    <radialGradient id="m-orange-shade" cx="0.6" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#9A3412" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9A3412" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue monster gradient -->
    <radialGradient id="m-blue" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="45%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </radialGradient>
    <!-- Purple monster gradient -->
    <radialGradient id="m-purple" cx="0.4" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <!-- Yellow monster gradient -->
    <radialGradient id="m-yellow" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <!-- Background glow -->
    <radialGradient id="m-glow" cx="0.5" cy="0.48" r="0.55">
      <stop offset="0%" stop-color="#FED7AA" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#FDBA74" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Warm overlay -->
    <radialGradient id="m-warm" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFF7ED" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFF7ED" stop-opacity="0"/>
    </radialGradient>
    <!-- Ribbon gradient -->
    <linearGradient id="m-ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="30%" stop-color="#FDBA74"/>
      <stop offset="70%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="m-shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset dx="0" dy="5" result="shifted"/>
      <feFlood flood-color="#9A3412" flood-opacity="0.1"/>
      <feComposite in2="shifted" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sparkle glow -->
    <filter id="m-sparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Blush -->
    <radialGradient id="m-blush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <!-- Confetti colors -->
    <linearGradient id="m-confetti1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Background warm glow -->
  <path d="M200 10 C320 10, 395 90, 395 200 C395 310, 320 390, 200 390 C80 390, 5 310, 5 200 C5 90, 80 10, 200 10 Z" fill="url(#m-glow)"/>
  <path d="M200 30 C300 30, 370 100, 370 200 C370 300, 300 370, 200 370 C100 370, 30 300, 30 200 C30 100, 100 30, 200 30 Z" fill="url(#m-warm)"/>

