    <!-- Left arm - raised triumphantly -->
    <path d="M158 240 C148 235, 135 220, 125 195 C122 188, 118 180, 115 172 C113 167, 115 162, 120 160 C125 158, 130 162, 132 167 C135 175, 138 185, 142 195 C148 210, 150 225, 155 235" fill="#FDE9C8"/>
    <!-- Left arm outfit sleeve -->
    <path d="M158 240 C150 237, 142 228, 138 218 C140 215, 145 215, 148 218 C152 225, 155 232, 158 238" fill="url(#hp-outfit)"/>
    <!-- Left hand -->
    <path d="M115 172 C112 165, 114 158, 120 156 C126 154, 132 158, 134 165 C135 168, 133 172, 130 173 C126 175, 118 175, 115 172Z" fill="#FEF3E2"/>

    <!-- Flag pole in raised hand -->
    <path d="M122 162 L118 58" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M118 58 C122 55, 130 52, 140 55 C148 58, 155 52, 158 48 C158 55, 155 62, 148 65 C140 68, 130 72, 118 75Z" fill="url(#hp-flag)"/>
    <!-- Flag highlight -->
    <path d="M120 60 C125 58, 132 56, 138 58 C144 60, 148 57, 150 54" stroke="white" stroke-width="0.6" fill="none" opacity="0.3"/>
    <!-- Flag star -->
    <path d="M136 60 L137.5 56 L139 60 L143 58.5 L139.5 60.5 L141 64 L138 61.5 L135 64 L136 60.5 L132.5 59Z" fill="white" opacity="0.6"/>

    <!-- Right arm - at side confidently -->
    <path d="M242 240 C250 245, 258 258, 262 270 C264 276, 262 282, 258 284 C254 286, 248 282, 248 276 C247 268, 246 260, 244 250" fill="#FDE9C8"/>
    <!-- Right arm sleeve -->
    <path d="M242 240 C248 243, 254 250, 258 258 C255 258, 250 256, 248 252 C245 248, 244 244, 242 240" fill="url(#hp-outfit)"/>
    <!-- Right hand - fist -->
    <path d="M255 276 C258 272, 264 272, 266 276 C268 280, 264 286, 258 288 C252 288, 248 284, 250 278Z" fill="#FEF3E2"/>
  </g>

  <!-- Boots -->
  <path d="M170 312 C165 316, 158 325, 160 332 C162 338, 170 342, 180 340 C188 338, 192 332, 190 326 C188 320, 182 314, 176 312" fill="url(#hp-boot)"/>
  <path d="M225 312 C230 316, 237 325, 235 332 C233 338, 225 342, 215 340 C207 338, 203 332, 205 326 C207 320, 213 314, 219 312" fill="url(#hp-boot)"/>
  <!-- Boot soles -->
  <path d="M160 334 C163 338, 172 342, 182 340 C188 338, 190 334, 188 330" stroke="#451A03" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M235 334 C232 338, 223 342, 213 340 C207 338, 205 334, 207 330" stroke="#451A03" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- ======= SCARF ======= -->
  <path d="M162 228 C170 222, 185 218, 200 218 C215 218, 230 222, 238 228 C242 232, 240 238, 235 240 C225 244, 210 242, 200 242 C190 242, 175 244, 165 240 C160 238, 158 232, 162 228Z" fill="url(#hp-scarf)"/>
  <!-- Scarf tail flowing in wind -->
  <path d="M238 232 C248 230, 260 225, 272 228 C282 231, 288 238, 280 242 C272 246, 260 240, 252 238 C245 236, 240 236, 238 234Z" fill="url(#hp-scarf)" opacity="0.9"/>
  <!-- Scarf folds -->
  <path d="M170 230 C180 227, 195 226, 200 226" stroke="#991B1B" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M200 226 C205 226, 220 227, 230 230" stroke="#991B1B" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M248 230 C258 228, 268 228, 275 232" stroke="#991B1B" stroke-width="0.7" fill="none" opacity="0.25"/>
  <!-- Scarf end detail -->
  <path d="M275 235 C280 232, 285 235, 282 240 C279 244, 274 243, 274 238Z" fill="#DC2626" opacity="0.7"/>
  <path d="M272 238 C276 236, 280 238, 278 242 C276 245, 272 244, 272 240Z" fill="#DC2626" opacity="0.5"/>

  <!-- ======= HEAD ======= -->
  <g filter="url(#hp-shadow)">
    <!-- Main head shape -->
    <path d="M135 175 C135 135, 155 108, 200 108 C245 108, 265 135, 265 175 C265 205, 252 228, 228 236 C218 239, 182 239, 172 236 C148 228, 135 205, 135 175Z" fill="url(#hp-face)"/>
    <!-- Face highlight -->
    <path d="M152 155 C152 138, 168 122, 200 122 C232 122, 248 138, 248 155 C248 168, 240 178, 226 182 C216 185, 184 185, 174 182 C160 178, 152 168, 152 155Z" fill="white" opacity="0.1"/>
  </g>

  <!-- ======= EYES ======= -->
  <!-- Left eye - confident determined look -->
  <g>
    <!-- Eye shape -->
    <path d="M166 172 C166 160, 175 152, 185 152 C195 152, 201 160, 201 172 C201 184, 195 190, 185 190 C175 190, 166 184, 166 172Z" fill="white"/>
    <!-- Eyebrow - determined angle -->
    <path d="M163 148 C170 142, 182 140, 195 144" stroke="#78350F" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Iris -->
    <path d="M172 174 C172 166, 177 160, 185 160 C193 160, 197 166, 197 174 C197 182, 193 187, 185 187 C177 187, 172 182, 172 174Z" fill="url(#hp-iris)"/>
    <!-- Pupil -->
    <path d="M180 175 C180 171, 182 168, 185 168 C188 168, 190 171, 190 175 C190 179, 188 182, 185 182 C182 182, 180 179, 180 175Z" fill="#451A03"/>
    <!-- Main highlight -->
    <path d="M177 166 C177 163, 179 161, 182 161 C185 161, 187 163, 187 166 C187 169, 185 171, 182 171 C179 171, 177 169, 177 166Z" fill="white" opacity="0.9"/>
    <!-- Secondary highlight -->
    <circle cx="190" cy="179" r="2" fill="white" opacity="0.5"/>
    <!-- Confident sparkle -->
    <path d="M192 163 L193 160 L194 163 L197 162 L194 163 L195 166 L194 163 L191 164Z" fill="white" opacity="0.6"/>
  </g>

  <!-- Right eye -->
  <g>
    <path d="M205 172 C205 160, 214 152, 224 152 C234 152, 240 160, 240 172 C240 184, 234 190, 224 190 C214 190, 205 184, 205 172Z" fill="white"/>
    <!-- Eyebrow -->
    <path d="M211 144 C224 140, 236 142, 243 148" stroke="#78350F" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Iris -->
    <path d="M209 174 C209 166, 214 160, 222 160 C230 160, 235 166, 235 174 C235 182, 230 187, 222 187 C214 187, 209 182, 209 174Z" fill="url(#hp-iris)"/>
    <!-- Pupil -->
    <path d="M217 175 C217 171, 219 168, 222 168 C225 168, 227 171, 227 175 C227 179, 225 182, 222 182 C219 182, 217 179, 217 175Z" fill="#451A03"/>
    <!-- Main highlight -->
    <path d="M214 166 C214 163, 216 161, 219 161 C222 161, 224 163, 224 166 C224 169, 222 171, 219 171 C216 171, 214 169, 214 166Z" fill="white" opacity="0.9"/>
    <!-- Secondary highlight -->
    <circle cx="227" cy="179" r="2" fill="white" opacity="0.5"/>
    <!-- Sparkle -->
    <path d="M229 163 L230 160 L231 163 L234 162 L231 163 L232 166 L231 163 L228 164Z" fill="white" opacity="0.6"/>
  </g>

  <!-- Blush -->
  <ellipse cx="165" cy="195" rx="12" ry="6" fill="url(#hp-blush)"/>
  <ellipse cx="241" cy="195" rx="12" ry="6" fill="url(#hp-blush)"/>

  <!-- Nose - small pointed -->
  <path d="M197 194 C199 190, 201 190, 203 194 C204 196, 201 199, 200 199 C199 199, 196 196, 197 194Z" fill="#D97706" opacity="0.35"/>

  <!-- Determined smile - slightly asymmetric -->
  <path d="M186 208 C190 215, 198 218, 204 218 C210 218, 215 214, 218 210" stroke="#78350F" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.45"/>
  <!-- Confident smirk corner -->
  <path d="M218 210 C220 208, 221 207, 222 208" stroke="#78350F" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- ======= EXPLORER HAT ======= -->
  <!-- Hat brim -->
  <path d="M128 125 C125 128, 124 135, 128 140 C135 148, 165 155, 200 155 C235 155, 265 148, 272 140 C276 135, 275 128, 272 125 C260 118, 235 112, 200 112 C165 112, 140 118, 128 125Z" fill="url(#hp-hat)"/>
  <!-- Hat brim edge highlight -->
  <path d="M135 130 C150 122, 175 116, 200 116 C225 116, 250 122, 265 130" stroke="#A16207" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Hat dome -->
  <path d="M152 128 C152 105, 168 82, 200 82 C232 82, 248 105, 248 128 C248 132, 240 138, 200 138 C160 138, 152 132, 152 128Z" fill="url(#hp-hat)"/>
  <!-- Hat dome highlight -->
  <path d="M168 105 C172 92, 185 85, 200 85 C215 85, 228 92, 232 105 C228 100, 215 95, 200 95 C185 95, 172 100, 168 105Z" fill="#A16207" opacity="0.3"/>
  <!-- Hat band -->
  <path d="M152 125 C155 120, 175 115, 200 115 C225 115, 245 120, 248 125 C245 130, 225 135, 200 135 C175 135, 155 130, 152 125Z" fill="url(#hp-hatBand)"/>
  <!-- Hat band texture -->
  <path d="M165 122 L165 128" stroke="#991B1B" stroke-width="0.5" opacity="0.3"/>
  <path d="M180 120 L180 130" stroke="#991B1B" stroke-width="0.5" opacity="0.3"/>
  <path d="M195 119 L195 131" stroke="#991B1B" stroke-width="0.5" opacity="0.3"/>
  <path d="M210 119 L210 131" stroke="#991B1B" stroke-width="0.5" opacity="0.3"/>
  <path d="M225 120 L225 130" stroke="#991B1B" stroke-width="0.5" opacity="0.3"/>
  <path d="M240 122 L240 128" stroke="#991B1B" stroke-width="0.5" opacity="0.3"/>
  <!-- Hat top dent -->
  <path d="M180 88 C190 83, 210 83, 220 88" stroke="#451A03" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- ======= SPARKLE / ENERGY EFFECTS ======= -->
  <g filter="url(#hp-glow)">
    <!-- Star sparkles around flag -->
    <path d="M100 80 L102 74 L104 80 L110 78 L104 80 L106 86 L104 80 L98 82Z" fill="#FDE68A" opacity="0.7"/>
    <path d="M140 42 L141.5 38 L143 42 L147 40.5 L143 42 L144.5 46 L143 42 L139 43.5Z" fill="#FBBF24" opacity="0.6"/>
    <path d="M88 55 L89 52 L90 55 L93 54 L90 55 L91 58 L90 55 L87 56Z" fill="#FCD34D" opacity="0.5"/>
  </g>

  <!-- Warm light particles -->
  <circle cx="75" cy="140" r="2.5" fill="#FDE68A" opacity="0.35" filter="url(#hp-glow)"/>
  <circle cx="330" cy="160" r="2" fill="#FCD34D" opacity="0.3" filter="url(#hp-glow)"/>
  <circle cx="55" cy="200" r="1.8" fill="#FBBF24" opacity="0.25" filter="url(#hp-glow)"/>
  <circle cx="350" cy="250" r="2" fill="#FDE68A" opacity="0.28" filter="url(#hp-glow)"/>
  <circle cx="155" cy="60" r="2" fill="#FCD34D" opacity="0.3" filter="url(#hp-glow)"/>
  <circle cx="260" cy="50" r="1.5" fill="#FBBF24" opacity="0.25" filter="url(#hp-glow)"/>
</svg>