<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Sky/sunset gradient background -->
    <radialGradient id="hp-bgGlow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <!-- Face gradient -->
    <radialGradient id="hp-face" cx="0.45" cy="0.38" r="0.55">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="60%" stop-color="#FEF3E2"/>
      <stop offset="100%" stop-color="#FDE9C8"/>
    </radialGradient>
    <!-- Body warm outfit -->
    <linearGradient id="hp-outfit" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- Hat gradient -->
    <linearGradient id="hp-hat" x1="0.3" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="30%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <!-- Hat band -->
    <linearGradient id="hp-hatBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <!-- Scarf gradient -->
    <linearGradient id="hp-scarf" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <!-- Backpack gradient -->
    <linearGradient id="hp-pack" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#A16207"/>
      <stop offset="50%" stop-color="#854D0E"/>
      <stop offset="100%" stop-color="#713F12"/>
    </linearGradient>
    <!-- Iris gradient -->
    <radialGradient id="hp-iris" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="40%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </radialGradient>
    <!-- Mountain gradient -->
    <linearGradient id="hp-mountain" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#92400E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#78350F" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Sunburst gradient -->
    <radialGradient id="hp-sunburst" cx="0.5" cy="0.6" r="0.45">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#FBBF24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <!-- Rock gradient -->
    <linearGradient id="hp-rock" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#A8A29E"/>
      <stop offset="40%" stop-color="#78716C"/>
      <stop offset="100%" stop-color="#57534E"/>
    </linearGradient>
    <!-- Rock highlight -->
    <linearGradient id="hp-rockHi" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D6D3D1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A8A29E" stop-opacity="0"/>
    </linearGradient>
    <!-- Flag gradient -->
    <linearGradient id="hp-flag" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="hp-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#78350F" flood-opacity="0.15"/>
    </filter>
    <!-- Glow filter -->
    <filter id="hp-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cheek blush -->
    <radialGradient id="hp-blush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <!-- Boot gradient -->
    <linearGradient id="hp-boot" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#713F12"/>
    </linearGradient>
  </defs>

  <!-- Background warm glow -->
  <circle cx="200" cy="220" r="200" fill="url(#hp-bgGlow)"/>

  <!-- Sunburst rays -->
  <g opacity="0.12">
    <path d="M200 200 L160 40 L180 40Z" fill="#FBBF24"/>
    <path d="M200 200 L210 35 L230 40Z" fill="#FBBF24"/>
    <path d="M200 200 L260 50 L275 65Z" fill="#FCD34D"/>
    <path d="M200 200 L310 90 L318 110Z" fill="#FBBF24"/>
    <path d="M200 200 L340 150 L345 175Z" fill="#FCD34D"/>
    <path d="M200 200 L360 220 L355 245Z" fill="#FBBF24"/>
    <path d="M200 200 L130 50 L145 42Z" fill="#FCD34D"/>
    <path d="M200 200 L80 85 L90 70Z" fill="#FBBF24"/>
    <path d="M200 200 L50 140 L45 160Z" fill="#FCD34D"/>
    <path d="M200 200 L35 210 L38 235Z" fill="#FBBF24"/>
  </g>

  <!-- Sunrise glow behind character -->
  <ellipse cx="200" cy="260" rx="160" ry="80" fill="url(#hp-sunburst)"/>

  <!-- Mountain silhouettes - far background -->
  <path d="M0 380 L30 310 C40 295, 55 290, 70 295 L95 310 C105 295, 120 275, 140 280 L170 310 C180 300, 190 310, 200 315 L230 300 C245 285, 260 270, 280 280 L310 305 C320 295, 340 290, 355 300 L380 320 C390 310, 400 315, 400 380Z" fill="url(#hp-mountain)"/>
  <!-- Nearer mountain range -->
  <path d="M0 380 L50 335 C65 322, 80 325, 95 335 L130 350 C145 340, 160 330, 180 340 L200 350 C215 338, 235 328, 255 340 L280 355 C295 345, 315 340, 335 350 L370 360 C385 355, 395 358, 400 365 L400 380Z" fill="#78350F" opacity="0.1"/>

  <!-- Small birds in distance -->
  <g opacity="0.2" stroke="#78350F" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M60 120 C63 115, 66 115, 69 118 C72 115, 75 115, 78 120"/>
    <path d="M310 90 C312 87, 314 87, 316 89 C318 87, 320 87, 322 90"/>
    <path d="M340 130 C342 127, 344 127, 346 129 C348 127, 350 127, 352 130"/>
    <path d="M85 95 C87 92, 89 92, 91 94 C93 92, 95 92, 97 95"/>
  </g>

  <!-- ======= ROCK FORMATION ======= -->
  <g>
    <!-- Main rock -->
    <path d="M120 365 C115 360, 108 340, 112 325 C115 315, 125 305, 140 300 C155 296, 185 293, 215 293 C245 293, 270 296, 285 300 C300 305, 308 315, 310 325 C314 340, 308 360, 303 365 C290 372, 240 378, 200 378 C160 378, 135 372, 120 365Z" fill="url(#hp-rock)"/>
    <!-- Rock highlight -->
    <path d="M135 315 C142 308, 165 300, 200 298 C235 300, 258 308, 265 315 C268 320, 265 325, 255 328 C240 330, 220 328, 200 327 C180 328, 160 330, 145 328 C135 325, 132 320, 135 315Z" fill="url(#hp-rockHi)"/>
    <!-- Rock cracks/details -->
    <path d="M155 340 C160 335, 170 332, 175 338" stroke="#57534E" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M230 345 C235 340, 242 338, 248 342" stroke="#57534E" stroke-width="0.7" fill="none" opacity="0.25"/>
    <path d="M190 360 C195 355, 205 354, 210 358" stroke="#57534E" stroke-width="0.7" fill="none" opacity="0.2"/>
    <!-- Small rocks beside -->
    <path d="M95 372 C92 365, 95 358, 102 356 C108 354, 115 358, 118 365 C120 370, 115 375, 108 376 C100 377, 96 375, 95 372Z" fill="#78716C"/>
    <path d="M305 370 C302 363, 306 356, 314 354 C320 353, 326 357, 328 364 C330 369, 326 374, 318 375 C311 376, 306 374, 305 370Z" fill="#78716C"/>
  </g>

  <!-- ======= BACKPACK (behind body) ======= -->
  <path d="M235 230 C245 225, 258 228, 262 238 C268 255, 265 280, 260 295 C258 300, 250 305, 242 303 C235 300, 232 290, 232 275 C232 258, 233 240, 235 230Z" fill="url(#hp-pack)"/>
  <!-- Backpack flap -->
  <path d="M236 235 C242 228, 256 228, 260 235 C262 240, 258 248, 250 250 C242 252, 236 248, 234 242Z" fill="#A16207"/>
  <!-- Backpack buckle -->
  <path d="M245 248 C244 245, 248 243, 252 244 C256 245, 257 249, 254 251 C251 253, 246 251, 245 248Z" fill="#FDE68A" opacity="0.7"/>
  <!-- Backpack strap visible -->
  <path d="M238 238 C235 235, 228 235, 225 240" stroke="#854D0E" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ======= CHARACTER BODY ======= -->
  <g filter="url(#hp-shadow)">
    <!-- Body / adventure outfit -->
    <path d="M158 230 C152 248, 150 270, 154 290 C157 305, 168 315, 180 318 C190 320, 210 320, 220 318 C232 315, 243 305, 246 290 C250 270, 248 248, 242 230 C235 222, 218 216, 200 216 C182 216, 165 222, 158 230Z" fill="url(#hp-outfit)"/>
    <!-- Outfit shading -->
    <path d="M172 238 C168 252, 166 272, 170 290 C172 302, 180 310, 192 314 C198 315, 205 315, 210 314 C222 310, 230 302, 232 290 C236 272, 234 252, 230 238 C225 232, 212 226, 200 226 C188 226, 175 232, 172 238Z" fill="white" opacity="0.1"/>
    <!-- Belt -->
    <path d="M155 272 C160 268, 180 265, 200 265 C220 265, 240 268, 245 272 C240 276, 220 278, 200 278 C180 278, 160 276, 155 272Z" fill="#92400E"/>
    <!-- Belt buckle -->
    <path d="M193 268 C192 266, 195 264, 200 264 C205 264, 208 266, 207 268 C208 271, 205 273, 200 273 C195 273, 192 271, 193 268Z" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/>
    <!-- Pocket detail -->
