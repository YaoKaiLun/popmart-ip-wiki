    <path d="M300 265 C292 240, 290 215, 295 198 C300 182, 310 172, 322 168 C334 172, 344 182, 349 198 C354 215, 352 240, 344 265 C348 280, 350 296, 346 310 C342 320, 336 328, 328 332 L316 332 C308 328, 302 320, 298 310 C294 296, 296 280, 300 265 Z" fill="url(#m-purple)"/>
