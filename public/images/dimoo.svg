<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Skin gradient -->
    <radialGradient id="d-skin" cx="0.45" cy="0.38" r="0.55">
      <stop offset="0%" stop-color="#FFF5E8"/>
      <stop offset="45%" stop-color="#FEECD2"/>
      <stop offset="100%" stop-color="#F5D5A8"/>
    </radialGradient>
    <!-- Hat gradient -->
    <linearGradient id="d-hat" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="40%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <!-- Hat shading -->
    <linearGradient id="d-hat-shade" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0369A1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0"/>
    </linearGradient>
    <!-- Body hoodie gradient -->
    <linearGradient id="d-hoodie" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <!-- Eye iris gradient -->
    <radialGradient id="d-iris" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
    <!-- Background glow -->
    <radialGradient id="d-glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#BAE6FD" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#7DD3FC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <!-- Cloud gradient -->
    <linearGradient id="d-cloud" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <!-- Sparkle gradient -->
    <radialGradient id="d-sparkle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </radialGradient>
    <!-- Soft shadow filter -->
    <filter id="d-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="shifted"/>
      <feFlood flood-color="#0369A1" flood-opacity="0.12"/>
      <feComposite in2="shifted" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow filter for sparkles -->
    <filter id="d-star-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cheek blush gradient -->
    <radialGradient id="d-blush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FDA4AF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FDA4AF" stop-opacity="0"/>
    </radialGradient>
    <!-- Ear inner -->
    <radialGradient id="d-ear-inner" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FECDD3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FEECD2" stop-opacity="0.2"/>
    </radialGradient>
    <!-- Pom pom gradient -->
    <radialGradient id="d-pompom" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="60%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </radialGradient>
  </defs>

  <!-- Background glow circle -->
  <path d="M200 20 C310 20, 380 100, 380 200 C380 300, 310 380, 200 380 C90 380, 20 300, 20 200 C20 100, 90 20, 200 20 Z" fill="url(#d-glow)"/>

  <!-- Cloud 1 - top left, organic shape -->
  <g opacity="0.3">
    <path d="M35 75 C35 60, 50 48, 65 50 C68 38, 85 30, 100 38 C108 30, 125 32, 130 45 C140 42, 148 52, 145 62 C150 68, 148 80, 138 85 C135 92, 118 96, 105 92 C95 98, 72 98, 62 90 C48 92, 35 85, 35 75 Z" fill="url(#d-cloud)"/>
  </g>
  <!-- Cloud 2 - top right -->
  <g opacity="0.22">
    <path d="M280 52 C282 38, 298 28, 312 34 C318 25, 335 22, 345 32 C355 28, 368 35, 365 48 C372 52, 370 65, 362 70 C358 78, 340 82, 328 78 C318 84, 298 82, 290 74 C280 75, 275 65, 280 52 Z" fill="url(#d-cloud)"/>
  </g>
  <!-- Cloud 3 - lower left, small -->
  <g opacity="0.18">
    <path d="M25 210 C28 198, 42 192, 52 196 C56 188, 68 186, 75 192 C82 188, 90 194, 88 202 C92 208, 82 218, 68 216 C58 222, 38 220, 30 214 C24 215, 22 212, 25 210 Z" fill="url(#d-cloud)"/>
  </g>
  <!-- Cloud 4 - right side -->
  <g opacity="0.16">
    <path d="M340 225 C342 215, 352 210, 360 214 C364 208, 375 206, 380 212 C386 218, 382 228, 374 230 C370 236, 355 238, 348 232 C340 234, 336 228, 340 225 Z" fill="url(#d-cloud)"/>
  </g>

  <!-- Floating sparkle stars (background) -->
  <g filter="url(#d-star-glow)" opacity="0.5">
    <path d="M130 42 C132 38, 134 42, 138 40 C134 42, 136 46, 134 48 C132 46, 130 48, 128 46 C130 44, 126 42, 130 42 Z" fill="#BAE6FD"/>
  </g>
  <g filter="url(#d-star-glow)" opacity="0.4">
    <path d="M352 130 C354 124, 356 130, 362 128 C356 130, 358 136, 356 140 C354 136, 350 138, 348 134 C352 132, 346 128, 352 130 Z" fill="#7DD3FC"/>
  </g>
  <g filter="url(#d-star-glow)" opacity="0.35">
    <path d="M58 295 C60 290, 62 295, 66 293 C62 295, 64 300, 62 303 C60 300, 56 302, 54 298 C58 296, 52 293, 58 295 Z" fill="#BAE6FD"/>
  </g>

  <!-- Tiny light dots -->
  <path d="M100 128 C102 126, 104 128, 102 130 C100 132, 98 130, 100 128 Z" fill="#7DD3FC" opacity="0.5"/>
  <path d="M302 115 C303 113, 305 115, 304 117 C303 119, 301 117, 302 115 Z" fill="#38BDF8" opacity="0.45"/>
  <path d="M78 345 C80 343, 82 345, 80 347 C78 349, 76 347, 78 345 Z" fill="#7DD3FC" opacity="0.3"/>
  <path d="M328 345 C329 343, 331 345, 330 347 C329 349, 327 347, 328 345 Z" fill="#38BDF8" opacity="0.3"/>
  <path d="M340 305 C341 303, 343 305, 342 307 Z" fill="#BAE6FD" opacity="0.4"/>

  <!-- Ground shadow -->
  <path d="M130 375 C150 380, 250 380, 270 375 C280 372, 280 382, 200 385 C120 382, 120 372, 130 375 Z" fill="#0369A1" opacity="0.06"/>

  <!-- === CHARACTER === -->
  <g filter="url(#d-shadow)">

    <!-- Body / hoodie -->
    <path d="M148 278 C142 285, 138 300, 136 320 C134 340, 138 358, 145 368 C150 374, 162 378, 178 378 C185 378, 192 376, 200 374 C208 376, 215 378, 222 378 C238 378, 250 374, 255 368 C262 358, 266 340, 264 320 C262 300, 258 285, 252 278 C240 270, 220 265, 200 264 C180 265, 160 270, 148 278 Z" fill="url(#d-hoodie)"/>
    <!-- Hoodie chest highlight -->
    <path d="M165 285 C175 278, 190 272, 200 271 C210 272, 225 278, 235 285 C228 292, 212 298, 200 300 C188 298, 172 292, 165 285 Z" fill="#7DD3FC" opacity="0.2"/>
    <!-- Hoodie center line -->
    <path d="M200 274 C200 300, 200 340, 200 374" stroke="#0284C7" stroke-width="1.2" opacity="0.25" fill="none"/>
    <!-- Hoodie collar -->
    <path d="M168 275 C175 268, 188 262, 200 261 C212 262, 225 268, 232 275 C225 280, 212 284, 200 285 C188 284, 175 280, 168 275 Z" fill="#0EA5E9"/>

    <!-- Arms -->
    <path d="M148 282 C138 288, 125 300, 118 315 C112 328, 112 340, 118 348 C122 352, 128 352, 132 348 C136 340, 138 328, 142 318 C146 308, 150 298, 152 290 Z" fill="#0EA5E9"/>
    <path d="M252 282 C262 288, 275 300, 282 315 C288 328, 288 340, 282 348 C278 352, 272 352, 268 348 C264 340, 262 328, 258 318 C254 308, 250 298, 248 290 Z" fill="#0EA5E9"/>
    <!-- Arm shading -->
    <path d="M148 282 C138 288, 128 298, 122 310 C134 300, 146 292, 152 286 Z" fill="#0284C7" opacity="0.2"/>
    <path d="M252 282 C262 288, 272 298, 278 310 C266 300, 254 292, 248 286 Z" fill="#0284C7" opacity="0.2"/>

    <!-- Feet -->
    <path d="M160 370 C155 372, 148 374, 148 378 C148 384, 158 388, 172 388 C186 388, 192 384, 190 378 C188 374, 180 372, 175 370 Z" fill="#0369A1"/>
    <path d="M225 370 C220 372, 212 374, 210 378 C208 384, 214 388, 228 388 C242 388, 252 384, 252 378 C252 374, 245 372, 240 370 Z" fill="#0369A1"/>

    <!-- === HEAD === -->
    <!-- Large round head -->
    <path d="M105 192 C105 130, 145 88, 200 88 C255 88, 295 130, 295 192 C295 248, 262 278, 200 278 C138 278, 105 248, 105 192 Z" fill="url(#d-skin)"/>

    <!-- Subtle face contour / highlight -->
    <path d="M120 185 C122 140, 155 108, 200 108 C245 108, 278 140, 280 185 C278 230, 252 258, 200 258 C148 258, 122 230, 120 185 Z" fill="white" opacity="0.08"/>

    <!-- Ears -->
    <path d="M108 195 C98 188, 92 178, 94 170 C96 162, 104 158, 110 162 C116 166, 118 175, 115 185 C114 190, 112 194, 108 195 Z" fill="url(#d-skin)"/>
    <path d="M106 188 C102 184, 100 178, 101 172 C102 168, 106 166, 108 168 C112 172, 112 180, 110 186 Z" fill="url(#d-ear-inner)"/>
    <path d="M292 195 C302 188, 308 178, 306 170 C304 162, 296 158, 290 162 C284 166, 282 175, 285 185 C286 190, 288 194, 292 195 Z" fill="url(#d-skin)"/>
    <path d="M294 188 C298 184, 300 178, 299 172 C298 168, 294 166, 292 168 C288 172, 288 180, 290 186 Z" fill="url(#d-ear-inner)"/>

    <!-- Hair wisps peeking from under cap -->
    <path d="M128 165 C130 155, 135 148, 140 145 C136 152, 134 160, 132 168 Z" fill="#D4A574" opacity="0.5"/>
    <path d="M136 160 C138 152, 144 146, 148 143 C145 150, 142 158, 140 164 Z" fill="#C09060" opacity="0.4"/>
    <path d="M268 162 C266 152, 262 146, 258 143 C260 150, 262 158, 264 166 Z" fill="#D4A574" opacity="0.45"/>
    <path d="M262 158 C260 150, 255 144, 250 142 C254 148, 258 156, 260 162 Z" fill="#C09060" opacity="0.35"/>

    <!-- === CAP / BEANIE === -->
    <!-- Main cap shape -->
    <path d="M118 168 C115 140, 125 108, 150 92 C168 82, 185 77, 200 76 C215 77, 232 82, 250 92 C275 108, 285 140, 282 168 C272 155, 250 142, 225 136 C208 132, 192 132, 175 136 C150 142, 128 155, 118 168 Z" fill="url(#d-hat)"/>
    <!-- Cap shading overlay -->
    <path d="M118 168 C115 140, 125 108, 150 92 C168 82, 185 77, 200 76 C215 77, 232 82, 250 92 C275 108, 285 140, 282 168 C272 155, 250 142, 225 136 C208 132, 192 132, 175 136 C150 142, 128 155, 118 168 Z" fill="url(#d-hat-shade)"/>
    <!-- Cap highlight -->
    <path d="M155 100 C168 90, 185 84, 200 82 C215 84, 225 88, 232 94 C220 86, 200 82, 180 86 C168 90, 158 96, 155 100 Z" fill="white" opacity="0.2"/>

    <!-- Brim of cap -->
    <path d="M112 170 C115 160, 140 148, 175 143 C192 140, 208 140, 225 143 C260 148, 285 160, 288 170 C285 174, 260 166, 225 160 C208 157, 192 157, 175 160 C140 166, 115 174, 112 170 Z" fill="#0284C7"/>
    <!-- Brim highlight -->
    <path d="M118 167 C125 160, 148 150, 180 146 C195 144, 205 144, 220 146 C252 150, 275 160, 282 167 C272 162, 248 154, 218 150 C205 148, 195 148, 182 150 C152 154, 128 162, 118 167 Z" fill="#38BDF8" opacity="0.5"/>

    <!-- Cap band/stripe -->
    <path d="M130 152 C148 144, 172 138, 200 136 C228 138, 252 144, 270 152" stroke="#BAE6FD" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>

    <!-- Pom pom on top -->
    <path d="M192 76 C188 68, 190 58, 196 54 C200 51, 206 52, 210 56 C214 60, 214 68, 210 76 C206 72, 196 72, 192 76 Z" fill="url(#d-pompom)"/>
    <path d="M196 60 C198 56, 204 56, 206 60 C204 58, 198 58, 196 60 Z" fill="white" opacity="0.4"/>

    <!-- === EYES === -->
    <!-- Left eye white -->
    <path d="M155 192 C155 178, 163 168, 175 168 C187 168, 195 178, 195 192 C195 206, 187 216, 175 216 C163 216, 155 206, 155 192 Z" fill="white"/>
    <!-- Left eye iris -->
    <path d="M160 194 C160 183, 166 175, 175 175 C184 175, 190 183, 190 194 C190 205, 184 213, 175 213 C166 213, 160 205, 160 194 Z" fill="url(#d-iris)"/>
    <!-- Left pupil -->
    <path d="M167 196 C167 189, 170 184, 175 184 C180 184, 183 189, 183 196 C183 203, 180 208, 175 208 C170 208, 167 203, 167 196 Z" fill="#0E7490"/>
    <!-- Left star pupil (5-pointed star) -->
    <path d="M175 186 L177.5 192 L184 193 L179 197.5 L180.5 204 L175 200.5 L169.5 204 L171 197.5 L166 193 L172.5 192 Z" fill="#164E63"/>
    <!-- Left eye highlights -->
    <path d="M168 185 C170 182, 174 181, 176 183 C174 182, 170 183, 168 185 Z" fill="white" opacity="0.9"/>
    <path d="M180 190 C181 189, 183 189, 183 191 Z" fill="white" opacity="0.6"/>

    <!-- Right eye white -->
    <path d="M205 192 C205 178, 213 168, 225 168 C237 168, 245 178, 245 192 C245 206, 237 216, 225 216 C213 216, 205 206, 205 192 Z" fill="white"/>
    <!-- Right eye iris -->
    <path d="M210 194 C210 183, 216 175, 225 175 C234 175, 240 183, 240 194 C240 205, 234 213, 225 213 C216 213, 210 205, 210 194 Z" fill="url(#d-iris)"/>
    <!-- Right pupil -->
    <path d="M217 196 C217 189, 220 184, 225 184 C230 184, 233 189, 233 196 C233 203, 230 208, 225 208 C220 208, 217 203, 217 196 Z" fill="#0E7490"/>
    <!-- Right star pupil -->
    <path d="M225 186 L227.5 192 L234 193 L229 197.5 L230.5 204 L225 200.5 L219.5 204 L221 197.5 L216 193 L222.5 192 Z" fill="#164E63"/>
    <!-- Right eye highlights -->
    <path d="M218 185 C220 182, 224 181, 226 183 C224 182, 220 183, 218 185 Z" fill="white" opacity="0.9"/>
    <path d="M230 190 C231 189, 233 189, 233 191 Z" fill="white" opacity="0.6"/>

    <!-- Blush cheeks -->
    <path d="M140 230 C145 224, 158 222, 164 226 C168 230, 165 238, 158 240 C150 242, 138 238, 140 230 Z" fill="url(#d-blush)"/>
    <path d="M236 230 C241 224, 254 222, 260 226 C264 230, 261 238, 254 240 C246 242, 234 238, 236 230 Z" fill="url(#d-blush)"/>

    <!-- Nose - tiny subtle bump -->
    <path d="M197 232 C198 229, 202 229, 203 232 C204 234, 201 236, 200 236 C199 236, 196 234, 197 232 Z" fill="#E8C4A0" opacity="0.5"/>

    <!-- Mouth - gentle smile -->
    <path d="M186 248 C190 252, 196 256, 200 256 C204 256, 210 252, 214 248" stroke="#C09060" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45"/>
    <!-- Slight mouth dimples -->
    <path d="M185 247 C184 249, 185 250, 186 249 Z" fill="#C09060" opacity="0.2"/>
    <path d="M215 247 C216 249, 215 250, 214 249 Z" fill="#C09060" opacity="0.2"/>

  </g>

  <!-- Foreground dreamy sparkles -->
  <g filter="url(#d-star-glow)" opacity="0.6">
    <path d="M88 260 L91 252 C92 250, 94 252, 96 250 L100 256 C98 256, 96 258, 98 262 L92 260 C90 262, 88 264, 86 262 Z" fill="#BAE6FD"/>
  </g>
  <g filter="url(#d-star-glow)" opacity="0.5">
    <path d="M312 168 L315 160 C316 158, 318 160, 320 158 L324 164 C322 164, 320 166, 322 170 L316 168 C314 170, 312 172, 310 170 Z" fill="#7DD3FC"/>
  </g>
  <g filter="url(#d-star-glow)" opacity="0.45">
    <path d="M325 290 L327 284 C328 282, 330 284, 332 283 L335 288 C333 288, 331 290, 333 293 L328 291 C326 293, 324 294, 323 292 Z" fill="#BAE6FD"/>
  </g>
  <g filter="url(#d-star-glow)" opacity="0.35">
    <path d="M70 155 L72 150 C73 149, 74 150, 76 149 L78 153 C77 153, 76 155, 77 157 L73 156 C72 157, 70 158, 69 157 Z" fill="#E0F2FE"/>
  </g>
</svg>
