  <!-- Hearts floating between monsters -->
  <g filter="url(#m-sparkle)">
    <path d="M175 108 C175 102, 180 97, 184 100 C188 97, 193 102, 193 108 C193 116, 184 123, 184 123 C184 123, 175 116, 175 108 Z" fill="#F97316" opacity="0.4"/>
