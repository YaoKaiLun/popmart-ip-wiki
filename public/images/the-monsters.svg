    <path d="M82 45 L86 42 L88 48 L84 50 Z" fill="#FBBF24" opacity="0.6"/>
    <path d="M345 72 C347 68, 352 70, 350 74 C348 78, 343 76, 345 72 Z" fill="#FB923C"/>
    <path d="M320 50 L324 48 L325 54 L321 55 Z" fill="#8B5CF6" opacity="0.5"/>
    <path d="M40 310 C42 306, 47 308, 45 312 Z" fill="#06B6D4" opacity="0.4"/>
    <path d="M365 290 C367 286, 372 288, 370 292 Z" fill="#F97316" opacity="0.4"/>
