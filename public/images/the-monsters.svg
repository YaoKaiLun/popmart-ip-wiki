    <path d="M312 213 C312 207, 316 203, 322 203 C328 203, 332 207, 332 213 C332 219, 328 223, 322 223 C316 223, 312 219, 312 213 Z" fill="#1E1B4B"/>
    <path d="M317 207 C319 205, 323 205, 324 207 Z" fill="white" opacity="0.7"/>
    <path d="M327 210 C328 209, 329 210, 328 211 Z" fill="white" opacity="0.5"/>
    <!-- Bottom eye -->
    <path d="M314 232 C314 227, 317 224, 322 224 C327 224, 330 227, 330 232 C330 237, 327 240, 322 240 C317 240, 314 237, 314 232 Z" fill="white"/>
    <path d="M317 233 C317 229, 319 227, 322 227 C325 227, 327 229, 327 233 C327 237, 325 239, 322 239 C319 239, 317 237, 317 233 Z" fill="#1E1B4B"/>
    <path d="M319 229 C320 228, 322 228, 322 229 Z" fill="white" opacity="0.6"/>

    <!-- Tiny mouth -->
    <path d="M316 258 C318 262, 322 264, 326 262 C328 260, 328 256, 326 254" stroke="#6D28D9" stroke-width="1.5" fill="none" stroke-linecap="round"/>

