    <path d="M100 200 C96 196, 98 192, 102 194 C106 198, 104 204, 100 200 Z" fill="#F97316"/>
    <path d="M245 240 C258 232, 272 218, 282 208 C286 204, 290 200, 292 202 C294 206, 290 212, 284 218 C276 228, 264 240, 252 248 Z" fill="#EA580C"/>
