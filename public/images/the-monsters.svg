    <path d="M111 179 C111 174, 113 171, 117 171 C121 171, 123 174, 123 179 C123 184, 121 187, 117 187 C113 187, 111 184, 111 179 Z" fill="#1E293B"/>
    <path d="M114 174 C115 173, 117 173, 118 174 Z" fill="white" opacity="0.7"/>

    <!-- Antenna -->
    <path d="M95 132 C95 122, 92 108, 88 98 C86 92, 85 86, 86 82" stroke="#0E7490" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M80 78 C82 72, 88 68, 92 70 C96 72, 96 80, 92 84 C88 88, 80 86, 80 78 Z" fill="#22D3EE"/>
